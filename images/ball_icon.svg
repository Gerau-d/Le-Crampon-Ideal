
<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <rect width="120" height="120" rx="15" fill="#0d2347"/>
  
  <!-- Soccer ball -->
  <circle cx="60" cy="60" r="35" fill="#ffffff"/>
  
  <!-- Center pentagon -->
  <polygon points="60,45 70,52 66,64 54,64 50,52" fill="#f0a500"/>
  
  <!-- Ball lines -->
  <line x1="60" y1="45" x2="60" y2="25" stroke="#f0a500" stroke-width="2"/>
  <line x1="70" y1="52" x2="88" y2="45" stroke="#f0a500" stroke-width="2"/>
  <line x1="66" y1="64" x2="78" y2="82" stroke="#f0a500" stroke-width="2"/>
  <line x1="54" y1="64" x2="42" y2="82" stroke="#f0a500" stroke-width="2"/>
  <line x1="50" y1="52" x2="32" y2="45" stroke="#f0a500" stroke-width="2"/>
</svg>
